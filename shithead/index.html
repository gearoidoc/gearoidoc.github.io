<!DOCTYPE HTML>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Shithead</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="game-container">

            <!-- AI Area - Top of Screen    -->
             <div id="ai-area">
                <h3>Opponent</h3>
                <div class="card-row" id="ai-downcards"></div>
                <div class="card-row" id="ai-upcards"></div>
                <div class="card-row" id="ai-hand"></div>
            </div>

            <!-- Mid-Table-->
             <div id="table-area">
                <div id="draw-pile">Draw Pile</div>
                <div id="waste-pile">Waste Pile</div>
             </div>

            <!-- Player Area - Bottom of Screen -->
             <div id="player-area">
                <div class="card-row" id="player-downcards"></div>
                <div class="card-row" id="player-upcards"></div>
                <div class="card-row" id="player-hand"></div>
             </div>

             <!-- Message + Action area -->
              <div id="message-area">
                <p id="message-text">Welcome to Shithead!</p>
                <button id="pickup-btn">Draw Pile</button>
                <button id="start-btn">Start Game</button>
              </div>
                
        </div>
            
        <script src="game.js"></script>
    </body>
</html>
